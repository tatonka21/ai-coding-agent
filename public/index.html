<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coding Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header / Top Bar -->
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo">🚀 AI Coding Agent</span>
      </div>
      <div class="topbar-center">
        <label for="modelSelect">Model:</label>
        <select id="modelSelect">
          <option value="qwen2.5-coder:7b">qwen2.5-coder:7b</option>
        </select>
      </div>
      <div class="topbar-right">
        <span id="statusIndicator" class="status-offline">● Offline</span>
      </div>
    </header>

    <!-- Main Content Area -->
    <div id="main-content">
      <!-- Left: Editor -->
      <div id="editor-panel">
        <div id="file-tabs">
          <button class="file-tab active" data-file="index.html">📄 HTML</button>
          <button class="file-tab" data-file="style.css">🎨 CSS</button>
          <button class="file-tab" data-file="app.js">⚡ JS</button>
        </div>
        <div id="editor-container"></div>
      </div>

      <!-- Right: Chat Panel -->
      <div id="chat-panel">
        <div class="chat-header">
          <span>🤖 AI Agent</span>
        </div>
        <div id="chatMessages">
          <div class="message ai">
            <div class="msg-bubble">
              👋 Hi! I'm your AI coding assistant. Ask me to build something or help with code!
            </div>
          </div>
        </div>
        <div id="chatInputArea">
          <textarea id="chatInput" placeholder="Ask the AI to build or modify your app..." rows="2"></textarea>
          <button id="sendChatBtn">➤</button>
        </div>
      </div>
    </div>

    <!-- Bottom: Preview -->
    <div id="preview-panel">
      <div class="preview-header">
        <span>🔍 Live Preview</span>
        <button id="runBtn" title="Run / Refresh Preview">▶ Run</button>
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
    </div>

    <!-- Bottom Toolbar -->
    <footer id="toolbar">
      <button id="runBtnFooter" class="toolbar-btn primary">▶ Run</button>
      <div class="toolbar-build">
        <input type="text" id="buildPrompt" placeholder="Describe the website you want to build..." />
        <button id="buildBtn" class="toolbar-btn accent">🤖 Build This</button>
      </div>
      <button id="exportBtn" class="toolbar-btn">📤 Export</button>
    </footer>
  </div>

  <!-- Monaco Editor -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="app.js"></script>
</body>
</html>
