<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Coding Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header / Top Bar -->
    <header id="topbar">
      <div class="topbar-left">
        <span class="logo">🚀 AI Coding Agent</span>
      </div>
      <div class="topbar-center">
        <label for="modelSelect">Model:</label>
        <select id="modelSelect">
          <option value="qwen2.5-coder:7b">qwen2.5-coder:7b</option>
        </select>
      </div>
      <div class="topbar-right">
        <span id="statusIndicator" class="status-offline">● Offline</span>
      </div>
    </header>

    <!-- Main Content: Three Equal Columns -->
    <div id="main-content">
      <!-- LEFT: Editor Panel -->
      <div id="editor-panel">
        <div id="editor-sidebar">
          <div class="sidebar-header">
            <div class="sidebar-tabs">
              <button class="sidebar-tab active" data-view="files">📁 Files</button>
              <button class="sidebar-tab" data-view="git">🔗 Git</button>
            </div>
          </div>
          
          <!-- Files View -->
          <div id="filesView" class="sidebar-view active">
            <div id="fileTree"></div>
            <button id="addFileBtn" class="sidebar-add-btn">+ Add File</button>
          </div>
          
          <!-- Git View -->
          <div id="gitView" class="sidebar-view">
            <div id="gitStatus">
              <div class="git-info">
                <span id="gitBranch">🌿 main</span>
                <span id="gitAhead" class="git-ahead"></span>
              </div>
              <div id="gitStatusList"></div>
            </div>
            <div class="git-actions">
              <input type="text" id="commitMessage" placeholder="Commit message..." />
              <button id="commitBtn" class="git-btn commit">✔ Commit</button>
              <div class="git-btn-row">
                <button id="pushBtn" class="git-btn">⬆ Push</button>
                <button id="pullBtn" class="git-btn">⬇ Pull</button>
                <button id="refreshGitBtn" class="git-btn">🔄</button>
              </div>
            </div>
            <div id="gitLog">
              <div class="git-log-header">Recent Commits</div>
              <div id="gitLogList"></div>
            </div>
          </div>
        </div>
        <div id="editor-main">
          <div id="file-tabs">
            <button class="file-tab active" data-file="index.html">📄 index.html</button>
            <button class="file-tab" data-file="style.css">🎨 style.css</button>
            <button class="file-tab" data-file="app.js">⚡ app.js</button>
          </div>
          <div id="editor-container"></div>
        </div>
      </div>

      <!-- CENTER: Preview Panel -->
      <div id="preview-panel">
        <div class="panel-header">
          <span>🔍 Live Preview</span>
          <button id="previewBtn" title="Run / Refresh Preview">▶ Preview</button>
        </div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
      </div>

      <!-- RIGHT: Chat Panel -->
      <div id="chat-panel">
        <div class="panel-header chat-header">
          <span>🤖 AI Agent</span>
        </div>
        <div id="chatMessages">
          <div class="message ai">
            <div class="msg-bubble">
              👋 Hi! I'm your AI coding assistant. Ask me to build something or help with code!
            </div>
          </div>
        </div>
        <div id="chatInputArea">
          <button id="attachBtn" class="attach-btn" title="Attach file">+</button>
          <textarea id="chatInput" placeholder="Ask the AI to build or modify your app..." rows="2"></textarea>
          <button id="sendChatBtn" title="Send message">➤</button>
        </div>
      </div>
    </div>

    <!-- Build This Bar -->
    <div id="buildBar">
      <input type="text" id="buildPrompt" placeholder="Describe the website or app you want to build..." />
      <button id="buildBtn" class="toolbar-btn accent">🤖 Build This</button>
      <div class="git-bar-actions">
        <button id="saveProjectBtn" class="toolbar-btn" title="Save Project">💾 Save</button>
        <button id="loadProjectBtn" class="toolbar-btn" title="Load Project">📂 Open</button>
        <button id="exportBtn" class="toolbar-btn" title="Export Code">📤 Export</button>
      </div>
    </div>
  </div>

  <!-- Monaco Editor -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="app.js"></script>
</body>
</html>
